name: WebdriverIO Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      BASE_URL: https://telnyx.com
      PORTAL_URL: https://portal.telnyx.com
      DEVELOPERS_URL: https://developers.telnyx.com
      SETI_URL: https://seti.telnyx.com
      NODE_ENV: prod
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build

      - name: Prepare Allure directories
        run: |
          rm -rf allure-results allure-report
          mkdir -p allure-results
          chmod -R 777 allure-results

      - name: Run Chrome tests in Docker
        run: docker compose run --rm chrome
        continue-on-error: true

      - name: Run Firefox tests in Docker
        run: docker compose run --rm firefox
        continue-on-error: true

      - name: Install project dependencies
        run: npm ci

      - name: Add Allure environment info
        if: always()
        run: |
          echo "Browser=Chrome and Firefox" >> allure-results/environment.properties
          echo "Base URL=$BASE_URL" >> allure-results/environment.properties
          echo "Portal URL=$PORTAL_URL" >> allure-results/environment.properties
          echo "Developers URL=$DEVELOPERS_URL" >> allure-results/environment.properties
          echo "SETI URL=$SETI_URL" >> allure-results/environment.properties
          echo "Node ENV=$NODE_ENV" >> allure-results/environment.properties
          echo "CI=$CI" >> allure-results/environment.properties
          echo "GitHub Branch=${GITHUB_REF_NAME}" >> allure-results/environment.properties
          echo "GitHub Run ID=${GITHUB_RUN_ID}" >> allure-results/environment.properties

      - name: Generate Allure report
        if: always()
        run: npm run allure:generate

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Deploy Allure report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report