name: WebdriverIO Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      BASE_URL: https://telnyx.com
      PORTAL_URL: https://portal.telnyx.com
      DEVELOPERS_URL: https://developers.telnyx.com
      SETI_URL: https://seti.telnyx.com
      NODE_ENV: prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build

      - name: Prepare Allure directories
        run: |
          rm -rf allure-results allure-report
          mkdir -p allure-results
          chmod -R 777 allure-results

      - name: Run Chrome tests
        run: docker compose run --rm chrome
        continue-on-error: true

      - name: Run Firefox tests
        run: docker compose run --rm firefox
        continue-on-error: true

      - name: Install project dependencies
        run: npm ci

      - name: Generate Allure report
        run: npm run allure:generate

      - name: Upload Allure report artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report